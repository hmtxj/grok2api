name: Build and Push Docker Image to GHCR

# 当有代码推送到 main 分支，或是手动发布 Release 时触发构建
on:
  push:
    branches: ["main"]
  # 允许您在 Github 网页的手动触发按钮点击运行
  workflow_dispatch:

env:
  # 统一设置镜像名字的变量，这里指代您的仓库名: hmtxj/grok2api
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # 这一块非常核心！必须要有读写 packages 的权限，这是利用 Github 自带的免签 Token 登录金库的关键
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 把仓库代码拉取到 Github 给咱们分配的这台临时服务器上
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 登录到 GitHub 的私有镜像金库 (ghcr.io)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. 解析和打标签。这段会自动根据情况生成 latest 标签
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      # 4. 真正开始 Build (构建) 并 Push (推送) 进金库
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
